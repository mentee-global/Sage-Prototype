document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

pan style=\"font-size:12.5px;color:#9A8F82;\">Stored on this device · yours to keep<\u002Fspan><\u002Fdiv>\n\n            <div style=\"background:#FFFFFF;border:1px solid #E6DFD4;border-radius:18px;padding:18px;\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;\"><span style=\"font-size:12px;font-weight:700;letter-spacing:.04em;color:#B8AE9F;text-transform:uppercase;\">Today<\u002Fspan><span style=\"font-size:12.5px;color:#9A8F82;\">~8 minutes<\u002Fspan><\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Serif',serif;font-size:20px;font-weight:600;margin-bottom:6px;\">Ratios &amp; proportions<\u002Fdiv>\n              <span style=\"display:inline-block;font-size:12px;color:#356859;background:#E7EFEA;border-radius:999px;padding:3px 10px;font-weight:600;\">Goal · {{ goalLabel }}<\u002Fspan>\n\n              <div style=\"height:1px;background:#EFE9DF;margin:16px 0;\"><\u002Fdiv>\n\n              <div style=\"font-size:12px;font-weight:700;letter-spacing:.03em;color:#356859;text-transform:uppercase;margin-bottom:8px;\">Understood<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:16px;\">\n                <sc-for list=\"{{ understoodItems }}\" as=\"u\" hint-placeholder-count=\"2\"><div style=\"display:flex;align-items:flex-start;gap:9px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#356859;flex:none;margin-top:6px;\"><\u002Fspan><span style=\"font-size:14.5px;color:#3F382F;line-height:1.4;\">{{ u.text }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ hasReview }}\" hint-placeholder-val=\"{{ falseVal }}\">\n                <div style=\"font-size:12px;font-weight:700;letter-spacing:.03em;color:#A56A2C;text-transform:uppercase;margin-bottom:8px;\">Needs review<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:16px;\">\n                  <sc-for list=\"{{ reviewItems }}\" as=\"r\" hint-placeholder-count=\"1\"><div style=\"display:flex;align-items:flex-start;gap:9px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#C0894A;flex:none;margin-top:6px;\"><\u002Fspan><span style=\"font-size:14.5px;color:#3F382F;line-height:1.4;\">{{ r.text }}<\u002Fspan><\u002Fdiv><\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ noReview }}\" hint-placeholder-val=\"{{ falseVal }}\">\n                <div style=\"font-size:13.5px;color:#9A8F82;margin-bottom:16px;\">Nothing flagged for review today. Nicely done.<\u002Fdiv>\n              <\u002Fsc-if>\n\n              <div style=\"font-size:12px;font-weight:700;letter-spacing:.03em;color:#9A8F82;text-transform:uppercase;margin-bottom:8px;\">Recommended next step<\u002Fdiv>\n              <div style=\"background:#EEF3F0;border-radius:13px;padding:13px 14px;display:flex;align-items:center;gap:11px;\">\n                <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;\"><path d=\"M5 12h12M13 7l5 5-5 5\" stroke=\"#356859\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size:14.5px;color:#29463D;font-weight:500;line-height:1.4;\">{{ nextStep }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;align-items:center;gap:6px;margin-top:14px;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"5\" y=\"10\" width=\"14\" height=\"10\" rx=\"2.2\" stroke=\"#B8AE9F\" stroke-width=\"1.6\"><\u002Frect><path d=\"M8 10V7.2a4 4 0 018 0V10\" stroke=\"#B8AE9F\" stroke-width=\"1.6\"><\u002Fpath><\u002Fsvg><span style=\"font-size:12px;color:#B0A595;\">Record local-9F2 · not shared with any institution<\u002Fspan><\u002Fdiv>\n\n            <sc-if value=\"{{ exported }}\" hint-placeholder-val=\"{{ falseVal }}\">\n              <div style=\"margin-top:12px;display:flex;align-items:center;gap:8px;padding:11px 13px;background:#E7EFEA;border-radius:12px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"11\" fill=\"#356859\"><\u002Fcircle><path d=\"M7 12.5l3.2 3.2L17 9\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><span style=\"font-size:13.5px;color:#29463D;font-weight:500;\">Saved a copy to this device. It’s yours to take anywhere.<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"margin-top:14px;display:flex;align-items:center;gap:8px;padding:11px 13px;background:#F1EDE4;border-radius:12px;\">\n              <span style=\"{{ syncDotStyle }}\"><\u002Fspan>\n              <span style=\"font-size:12.5px;color:#7A7064;\">{{ syncLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin-top:auto;padding-top:18px;display:flex;flex-direction:column;gap:12px;\">\n              <div style=\"width:100%;\"><x-import component=\"SageButton\" from=\"3fbf90b1-01a4-4a24-a141-e37b1b6b6035#/SageDS.jsx\" label=\"Save &amp; keep going\" variant=\"sage\" on-click=\"{{ goHome }}\" hint-size=\"100%,52px\" style=\"display:block;width:100%\"><\u002Fx-import><\u002Fdiv>\n              <div style=\"display:flex;justify-content:center;align-items:center;\">\n                <sc-if value=\"{{ notExported }}\" hint-placeholder-val=\"{{ trueVal }}\"><button onclick=\"{{ exportRecord }}\" style=\"background:none;border:none;color:#356859;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;\">Export my record<\u002Fbutton><\u002Fsc-if>\n                <sc-if value=\"{{ exported }}\" hint-placeholder-val=\"{{ falseVal }}\"><span style=\"font-size:13px;color:#B0A595;font-weight:600;\">Record exported to this device<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ESCALATION -->\n        <sc-if value=\"{{ sEscalate }}\" hint-placeholder-val=\"{{ falseVal }}\">\n          <div style=\"flex:1;display:flex;flex-direction:column;padding:24px 20px;\">\n            <div style=\"width:46px;height:46px;border-radius:14px;background:#F4E7E9;display:flex;align-items:center;justify-content:center;margin-bottom:16px;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"8.5\" r=\"3.5\" stroke=\"#800020\" stroke-width=\"1.7\"><\u002Fcircle><path d=\"M5.5 19c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6\" stroke=\"#800020\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <h2 style=\"font-family:'IBM Plex Serif',serif;font-size:25px;font-weight:600;line-height:1.25;margin:0 0 10px;\">I can help with learning. For this, a person may be better.<\u002Fh2>\n            <p style=\"font-size:15.5px;line-height:1.55;color:#5C544A;margin:0 0 20px;\">It sounds like you might want to talk something through. I can connect you with a MENTEE mentor, a real person who supports learners like you.<\u002Fp>\n\n            <div style=\"background:#FFFFFF;border:1px solid #E6DFD4;border-radius:18px;padding:16px;display:flex;align-items:center;gap:14px;\">\n              <div style=\"width:50px;height:50px;border-radius:50%;background:#800020;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Serif',serif;font-size:19px;font-weight:600;flex:none;\">AM<\u002Fdiv>\n              <div style=\"flex:1;\"><div style=\"font-size:16px;font-weight:600;\">Amaya<\u002Fdiv><div style=\"font-size:13px;color:#9A8F82;\">MENTEE mentor · English, Kiswahili<\u002Fdiv><div style=\"font-size:12.5px;color:#356859;font-weight:600;margin-top:3px;\">Usually replies within a day<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:8px;align-items:flex-start;margin-top:14px;\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"margin-top:1px;flex:none;\"><rect x=\"5\" y=\"10\" width=\"14\" height=\"10\" rx=\"2.2\" stroke=\"#9A8F82\" stroke-width=\"1.5\"><\u002Frect><path d=\"M8 10V7.2a4 4 0 018 0V10\" stroke=\"#9A8F82\" stroke-width=\"1.5\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-size:12.5px;color:#7A7064;line-height:1.45;\">Sage shares only what you choose. Your record stays yours.<\u002Fspan>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ escalated }}\" hint-placeholder-val=\"{{ falseVal }}\">\n              <div style=\"margin-top:16px;display:flex;gap:10px;align-items:flex-start;padding:14px;background:#E7EFEA;border:1px solid #BBD6C9;border-radius:14px;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;\"><circle cx=\"12\" cy=\"12\" r=\"11\" fill=\"#356859\"><\u002Fcircle><path d=\"M7 12.5l3.2 3.2L17 9\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><div><div style=\"font-size:14px;font-weight:700;color:#29463D;margin-bottom:2px;\">Request sent<\u002Fdiv><div style=\"font-size:13.5px;color:#3F382F;line-height:1.45;\">Amaya will reach out by tomorrow. You can keep learning in the meantime.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"margin-top:auto;padding-top:22px;display:flex;flex-direction:column;gap:11px;\">\n              <sc-if value=\"{{ notEscalated }}\" hint-placeholder-val=\"{{ trueVal }}\">\n                <div style=\"width:100%;\"><x-import component=\"SageButton\" from=\"3fbf90b1-01a4-4a24-a141-e37b1b6b6035#/SageDS.jsx\" label=\"Ask for a mentor\" variant=\"mentee\" on-click=\"{{ connect }}\" hint-size=\"100%,52px\" style=\"display:block;width:100%\"><\u002Fx-import><\u002Fdiv>\n                <button onclick=\"{{ goCheckin }}\" style=\"background:none;border:none;color:#9A8F82;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;\">Not now, keep learning<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ escalated }}\" hint-placeholder-val=\"{{ falseVal }}\">\n                <div style=\"width:100%;\"><x-import component=\"SageButton\" from=\"3fbf90b1-01a4-4a24-a141-e37b1b6b6035#/SageDS.jsx\" label=\"Keep learning\" variant=\"sage\" on-click=\"{{ goCheckin }}\" hint-size=\"100%,52px\" style=\"display:block;width:100%\"><\u002Fx-import><\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- WHATSAPP / SMS -->\n        <sc-if value=\"{{ sSms }}\" hint-placeholder-val=\"{{ falseVal }}\">\n          <div style=\"flex:1;display:flex;flex-direction:column;padding:24px 20px;\">\n            <div style=\"width:48px;height:48px;border-radius:14px;background:#E7EFEA;display:flex;align-items:center;justify-content:center;margin-bottom:16px;\">\n              <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"14\" rx=\"3\" stroke=\"#356859\" stroke-width=\"1.6\"><\u002Frect><path d=\"M6 9h12M6 13h7\" stroke=\"#356859\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <h2 style=\"font-family:'IBM Plex Serif',serif;font-size:25px;font-weight:600;line-height:1.2;margin:0 0 8px;\">Message Sage<\u002Fh2>\n            <p style=\"font-size:15px;line-height:1.55;color:#6B6157;margin:0 0 22px;\">No app download needed. Send a message to start learning. It works on basic phones and slow connections.<\u002Fp>\n\n            <!-- WhatsApp card -->\n            <div style=\"background:#FFFFFF;border:1.5px solid #B8E0C2;border-radius:18px;padding:18px;margin-bottom:12px;\">\n              <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:13px;\">\n                <div style=\"width:40px;height:40px;border-radius:12px;background:#25D366;display:flex;align-items:center;justify-content:center;flex:none;\">\n                  <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3a9 9 0 00-7.74 13.6L3 21l4.5-1.18A9 9 0 1012 3z\" fill=\"#25D366\" stroke=\"#fff\" stroke-width=\"1.4\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M9.2 8.4c-.2-.4-.5-.4-.7-.4h-.6c-.2 0-.5.1-.8.4C6.8 8.8 6 9.6 6 11.2s1.1 3.3 1.3 3.5c.2.2 2.1 3.3 5.2 4.5.7.3 1.3.5 1.7.6.7.2 1.4.1 1.9-.1.6-.3 1.9-.8 2.2-1.6.3-.8.3-1.4.2-1.6-.1-.1-.3-.2-.6-.4-.3-.1-1.7-.9-2-.9s-.4.1-.6.4c-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-1.5-.7-2.4-2.2-2.5-2.4-.1-.2 0-.3.1-.4l.4-.5c.1-.1.2-.3.1-.5L9.2 8.4z\" fill=\"#fff\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:16px;font-weight:700;color:#1A3D2B;\">WhatsApp<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#9A8F82;\">Free to message · works on any phone<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#F0FAF4;border-radius:12px;padding:13px 14px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;\">\n                <div>\n                  <div style=\"font-size:11px;font-weight:700;letter-spacing:.04em;color:#9A8F82;text-transform:uppercase;margin-bottom:2px;\">Demo number<\u002Fdiv>\n                  <div style=\"font-family:'IBM Plex Serif',serif;font-size:20px;font-weight:600;color:#241F1A;letter-spacing:.02em;\">+1 (555) 014-7243<\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ copiedWa }}\" style=\"padding:8px 13px;border-radius:999px;background:#E7EFEA;border:none;color:#356859;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;white-space:nowrap;\">Copy<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"width:100%;\"><x-import component=\"SageButton\" from=\"3fbf90b1-01a4-4a24-a141-e37b1b6b6035#/SageDS.jsx\" label=\"Open in WhatsApp\" variant=\"sage\" hint-size=\"100%,48px\" style=\"display:block;width:100%\"><\u002Fx-import><\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- SMS card -->\n            <div style=\"background:#FFFFFF;border:1.5px solid #E6DFD4;border-radius:18px;padding:18px;margin-bottom:18px;\">\n              <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:13px;\">\n                <div style=\"width:40px;height:40px;border-radius:12px;background:#E8E5DF;display:flex;align-items:center;justify-content:center;flex:none;\">\n                  <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 4h16v13H8l-4 4z\" stroke=\"#6B6157\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M8 10h8M8 13.5h5\" stroke=\"#6B6157\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:16px;font-weight:700;color:#241F1A;\">Text message (SMS)<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#9A8F82;\">Works without internet · basic phones<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#F6F2EB;border-radius:12px;padding:13px 14px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;\">\n                <div>\n                  <div style=\"font-size:11px;font-weight:700;letter-spacing:.04em;color:#9A8F82;text-transform:uppercase;margin-bottom:2px;\">Demo number<\u002Fdiv>\n                  <div style=\"font-family:'IBM Plex Serif',serif;font-size:20px;font-weight:600;color:#241F1A;letter-spacing:.02em;\">+1 (555) 014-7243<\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ copiedSms }}\" style=\"padding:8px 13px;border-radius:999px;background:#EEE9E0;border:none;color:#6B6157;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit;white-space:nowrap;\">Copy<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px;align-items:flex-start;padding:11px 13px;background:#F1EDE4;border-radius:11px;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:1px;\"><circle cx=\"12\" cy=\"12\" r=\"9\" stroke=\"#9A8F82\" stroke-width=\"1.5\"><\u002Fcircle><path d=\"M12 11v5\" stroke=\"#9A8F82\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"12\" cy=\"7.8\" r=\"1\" fill=\"#9A8F82\"><\u002Fcircle><\u002Fsvg>\n                <span style=\"font-size:12.5px;color:#7A7064;line-height:1.45;\">Text <strong>HELLO<\u002Fstrong> to start. Sage replies in your language and keeps your progress.<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:8px;align-items:flex-start;padding:11px 13px;background:#F6F2EB;border-radius:11px;margin-bottom:18px;\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;margin-top:1px;\"><rect x=\"5\" y=\"10\" width=\"14\" height=\"10\" rx=\"2.2\" stroke=\"#9A8F82\" stroke-width=\"1.5\"><\u002Frect><path d=\"M8 10V7.2a4 4 0 018 0V10\" stroke=\"#9A8F82\" stroke-width=\"1.5\"><\u002Fpath><\u002Fsvg>\n              <span style=\"font-size:12px;color:#9A8F82;line-height:1.45;\">This is a prototype demo number. WhatsApp and SMS access is in active development. Standard message rates may apply.<\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"margin-top:auto;padding-top:4px;width:100%;\"><x-import component=\"SageButton\" from=\"3fbf90b1-01a4-4a24-a141-e37b1b6b6035#/SageDS.jsx\" label=\"Back to home\" variant=\"sage\" on-click=\"{{ goHome }}\" hint-size=\"100%,52px\" style=\"display:block;width:100%\"><\u002Fx-import><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 440, &quot;height&quot;: 880 },\n  &quot;startScreen&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;welcome&quot;, &quot;lang&quot;, &quot;goal&quot;, &quot;access&quot;, &quot;home&quot;, &quot;checkin&quot;, &quot;lesson&quot;, &quot;explain&quot;, &quot;check&quot;, &quot;progress&quot;, &quot;escalate&quot;, &quot;sms&quot;], &quot;default&quot;: &quot;welcome&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;defaultLang&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;en&quot;, &quot;ar&quot;, &quot;fr&quot;, &quot;es&quot;, &quot;sw&quot;, &quot;uk&quot;, &quot;ps&quot;], &quot;default&quot;: &quot;en&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;startConnection&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;weak&quot;, &quot;online&quot;], &quot;default&quot;: &quot;weak&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.contentRef = React.createRef();\n    this.state = {\n      screen: props.startScreen || 'welcome',\n      history: [],\n      lang: props.defaultLang || 'en',\n      goal: null,\n      access: ['private'],\n      conn: (props.startConnection === 'online') ? 'online' : 'weak',\n      sync: (props.startConnection === 'online') ? 'synced' : 'local',\n      mood: null,\n      lessonText: '',\n      altExplain: false,\n      check: { qi: 0, picked: null, answered: false, wrong: false, missed: [] },\n      escalated: false,\n      exported: false,\n    };\n    this._timers = [];\n  }\n\n  LANGS = [\n    { code: 'en', name: 'English', native: 'English', hello: 'Hello', q: 'How are you today?', dir: 'ltr' },\n    { code: 'ar', name: 'Arabic', native: 'العربية', hello: 'مرحباً', q: 'كيف حالك اليوم؟', dir: 'rtl' },\n    { code: 'fr', name: 'French', native: 'Français', hello: 'Bonjour', q: 'Comment vas-tu aujourd’hui ?', dir: 'ltr' },\n    { code: 'es', name: 'Spanish', native: 'Español', hello: 'Hola', q: '¿Cómo estás hoy?', dir: 'ltr' },\n    { code: 'sw', name: 'Swahili', native: 'Kiswahili', hello: 'Habari', q: 'Habari yako leo?', dir: 'ltr' },\n    { code: 'uk', name: 'Ukrainian', native: 'Українська', hello: 'Вітаю', q: 'Як ти почуваєшся сьогодні?', dir: 'ltr' },\n    { code: 'ps', name: 'Pashto', native: 'پښتو', hello: 'سلام', q: 'نن څنګه يې؟', dir: 'rtl' },\n  ];\n\n  GOALS = [\n    { id: 'understand', title: 'Understand a lesson', desc: 'Get something explained clearly, in plain language.' },\n    { id: 'apply', title: 'Prepare for a scholarship or application', desc: 'Work toward an opportunity, step by step.' },\n    { id: 'pathway', title: 'Continue a learning pathway', desc: 'Pick up where you left off and keep going.' },\n  ];\n\n  ACCESS = [\n    { id: 'shared', title: 'This is a shared device', desc: 'Sage will ask before showing anything others on this device could see.' },\n    { id: 'private', title: 'Keep my record private to me', desc: 'Your learning record stays locked to you on this device.' },\n  ];\n\n  MOODS = [\n    { id: 'good', label: 'Good' },\n    { id: 'ok', label: 'Okay' },\n    { id: 'tired', label: 'Tired' },\n    { id: 'stressed', label: 'Stressed' },\n  ];\n\n  QUESTIONS = [\n    {\n      text: 'A bread recipe for 4 people uses 6 cups of flour. For 8 people, how much flour?',\n      options: [{ label: '8 cups' }, { label: '10 cups' }, { label: '12 cups', correct: true }, { label: '16 cups' }],\n      right: 'Yes. 8 people is double 4, so the flour doubles too: 6 × 2 = 12.',\n      hint: '8 people is double 4 people, so the flour doubles as well. What is 6 + 6?',\n    },\n    {\n      text: 'Doubling an amount means multiplying it by…',\n      options: [{ label: '1' }, { label: '2', correct: true }, { label: '4' }, { label: '6' }],\n      right: 'Exactly. Doubling is the same as × 2.',\n      hint: 'Doubling means making two of the same amount: one 6, plus another 6.',\n    },\n    {\n      text: 'For 2 people (half of 4), how much flour from the original 6 cups?',\n      options: [{ label: '2 cups' }, { label: '3 cups', correct: true }, { label: '4 cups' }, { label: '6 cups' }],\n      right: 'Right. Half the people means half the flour: 6 ÷ 2 = 3.',\n      hint: '2 people is half of 4, so take half of the flour. What is half of 6?',\n    },\n  ];\n\n  componentDidUpdate() {\n    if (this._lastScreen !== this.state.screen) {\n      this._lastScreen = this.state.screen;\n      if (this.contentRef.current) this.contentRef.current.scrollTop = 0;\n    }\n  }\n\n  go(s) { this.setState(st => ({ history: [...st.history, st.screen], screen: s })); }\n  back() { this.setState(st => { const h = [...st.history]; const p = h.pop(); return { history: h, screen: p || 'welcome' }; }); }\n  setLang(c) { this.setState({ lang: c }); }\n  setGoal(g) { this.setState({ goal: g }); }\n  toggleAccess(id) { this.setState(st => ({ access: st.access.includes(id) ? st.access.filter(x => x !== id) : [...st.access, id] })); }\n  _scheduleSync() {\n    if (this._homeDemo) return;\n    this._homeDemo = true;\n    if (this.state.conn === 'online') return;\n    this._timers.push(setTimeout(() => this.setState({ conn: 'online', sync: 'syncing' }), 2600));\n    this._timers.push(setTimeout(() => this.setState({ sync: 'synced' }), 4200));\n  }\n  enterHome() { this.go('home'); this._scheduleSync(); }\n  componentDidMount() { if (this.state.screen === 'home') this._scheduleSync(); }\n  componentWillUnmount() { (this._timers || []).forEach(clearTimeout); }\n  setMood(m) { this.setState({ mood: m }); }\n  onLessonInput(e) { this.setState({ lessonText: e.target.value }); }\n  useExample() { this.setState({ lessonText: 'A bread recipe for 4 people uses 6 cups of flour. How much flour do I need for 8 people?' }); }\n  toggleAlt() { this.setState(st => ({ altExplain: !st.altExplain })); }\n  pickAnswer(i) {\n    this.setState(st => {\n      const c = { ...st.check };\n      if (c.answered) return {};\n      const q = this.QUESTIONS[c.qi];\n      if (q.options[i].correct) { c.picked = i; c.answered = true; }\n      else { c.picked = i; c.wrong = true; if (!c.missed.includes(c.qi)) c.missed = [...c.missed, c.qi]; }\n      return { check: c };\n    });\n  }\n  nextQ() {\n    const c = this.state.check;\n    if (c.qi >= this.QUESTIONS.length - 1) { this.go('progress'); }\n    else { this.setState({ check: { qi: c.qi + 1, picked: null, answered: false, wrong: false, missed: c.missed } }); if (this.contentRef.current) this.contentRef.current.scrollTop = 0; }\n  }\n  connect() { this.setState({ escalated: true }); }\n  exportRecord() { this.setState({ exported: true }); }\n\n  optStyle(selected, tone) {\n    const sel = tone === 'mentee' ? { b: '#800020', bg: '#F4E7E9' } : { b: '#356859', bg: '#E7EFEA' };\n    const border = selected ? sel.b : '#E6DFD4';\n    const bg = selected ? sel.bg : '#FFFFFF';\n    return `display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:15px 16px;border:1.5px solid ${border};background:${bg};border-radius:16px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:border-color .15s,background .15s;`;\n  }\n  moodStyle(selected) {\n    return `padding:9px 17px;border-radius:999px;border:1.5px solid ${selected ? '#356859' : '#E2DACE'};background:${selected ? '#E7EFEA' : '#FFFFFF'};color:${selected ? '#29463D' : '#6B6157'};font-weight:600;font-size:14px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;`;\n  }\n  optAnswerStyle(state, answered) {\n    let border = '#E6DFD4', bg = '#FFFFFF';\n    if (state === 'correct') { border = '#356859'; bg = '#E7EFEA'; }\n    else if (state === 'wrong') { border = '#C0894A'; bg = '#FBF1E4'; }\n    const op = answered && state === 'idle' ? '0.5' : '1';\n    return `display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;text-align:left;padding:15px 16px;border:1.5px solid ${border};background:${bg};border-radius:14px;cursor:${answered ? 'default'
